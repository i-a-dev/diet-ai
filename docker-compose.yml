services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diet-ai-frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diet-ai-backend
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - ./backend/data:/var/www/html/data
    environment:
      - DATABASE_PATH=/var/www/html/data/diet.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
